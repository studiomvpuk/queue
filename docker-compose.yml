version: "3.9"

# QueueEase local dev infrastructure.
# Run: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: queueease-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: queueease
      POSTGRES_PASSWORD: queueease
      POSTGRES_DB: queueease
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queueease"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: queueease-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
